version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: nextjs-app
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=4000
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    # Healthcheck is already defined in Dockerfile (distroless).
